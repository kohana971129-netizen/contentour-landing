<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>리뷰 금칙어 필터 테스터 (내부용)</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f7fa; margin: 0; padding: 40px 20px; }
    .wrap { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    h1 { margin: 0 0 8px; font-size: 1.4rem; color: #0a2a5e; }
    .sub { color: #6b7280; font-size: 0.88rem; margin-bottom: 24px; }
    .meta { background: #f0f7ff; border-radius: 10px; padding: 14px 18px; font-size: 0.84rem; color: #1565c0; margin-bottom: 20px; }
    textarea { width: 100%; min-height: 140px; padding: 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 0.95rem; font-family: inherit; line-height: 1.6; resize: vertical; outline: none; }
    textarea:focus { border-color: #1565c0; }
    .btns { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    button { padding: 11px 20px; border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-primary { background: #1565c0; color: #fff; }
    .btn-primary:hover { background: #0d47a1; }
    .btn-secondary { background: #f0f5ff; color: #1565c0; border: 1.5px solid #bbdefb; }
    .btn-clear { background: #f5f5f5; color: #666; }
    .result { margin-top: 24px; padding: 20px; border-radius: 12px; display: none; }
    .result.ok { background: #e8f5e9; border-left: 4px solid #2e7d32; }
    .result.soft { background: #fff8e1; border-left: 4px solid #ff9800; }
    .result.hard { background: #ffebee; border-left: 4px solid #c62828; }
    .result h3 { margin: 0 0 10px; font-size: 1rem; }
    .result.ok h3 { color: #2e7d32; }
    .result.soft h3 { color: #e65100; }
    .result.hard h3 { color: #c62828; }
    .matches { margin-top: 10px; }
    .tag { display: inline-block; padding: 4px 10px; background: rgba(0,0,0,0.05); border-radius: 6px; font-size: 0.8rem; margin: 2px 4px 2px 0; font-weight: 600; }
    .examples { margin-top: 32px; padding-top: 24px; border-top: 1px solid #e5e7eb; }
    .examples h3 { font-size: 0.95rem; color: #374151; margin: 0 0 10px; }
    .example-btn { display: inline-block; padding: 6px 12px; background: #f5f5f5; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 0.8rem; color: #555; cursor: pointer; margin: 3px; }
    .example-btn:hover { background: #e3f2fd; border-color: #90caf9; color: #1565c0; }
    .behavior { font-size: 0.82rem; line-height: 1.7; color: #555; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔍 리뷰 금칙어 필터 테스터</h1>
    <p class="sub">로그인 없이 텍스트를 입력해 차단/플래그 동작을 즉시 검증합니다 (내부용)</p>

    <div class="meta" id="metaInfo">로드 중...</div>

    <textarea id="input" placeholder="리뷰 텍스트를 입력해주세요. 아래 예시 버튼으로 빠르게 테스트할 수 있어요."></textarea>

    <div style="margin-top:14px;display:flex;align-items:center;gap:12px;font-size:0.88rem;">
      <span style="color:#374151;font-weight:600;">⭐ 종합 별점:</span>
      <select id="ratingSelect" style="padding:8px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:0.9rem;font-family:inherit;">
        <option value="5">5점 (매우 만족)</option>
        <option value="4">4점 (만족)</option>
        <option value="3">3점 (보통)</option>
        <option value="2">2점 (불만족) — 자동 보류</option>
        <option value="1">1점 (매우 불만족) — 자동 보류</option>
      </select>
    </div>

    <div class="btns">
      <button class="btn-primary" onclick="runCheck()">🔍 검사하기</button>
      <button class="btn-clear" onclick="clearAll()">지우기</button>
    </div>

    <div id="result" class="result"></div>

    <div class="examples">
      <h3>📋 동작 규칙</h3>
      <div class="behavior">
        ✓ <strong>정상</strong> → 작성 가능 + 즉시 공개 (is_public=true)<br>
        ⚠️ <strong>자동 보류</strong> → 작성 가능 + 관리자 검토 대기 (is_public=false, auto_flagged=true)<br>
        &nbsp;&nbsp;&nbsp;&nbsp;· 소프트 키워드 포함 (사기/고소/노쇼/최악/별로/실망 등 ~70개)<br>
        &nbsp;&nbsp;&nbsp;&nbsp;· 또는 종합 별점 ≤ 2점<br>
        🔒 <strong>하드 차단</strong> → 작성 자체 차단 (욕설/비방 표현)
      </div>
    </div>
  </div>

  <script src="review-filter.js?v=20260518b"></script>
  <script>
    document.getElementById('metaInfo').textContent =
      '필터 적재: 하드 ' + ReviewFilter.HARD_RULES_COUNT + '개 규칙 / 소프트 ' + ReviewFilter.SOFT_KEYWORDS_COUNT + '개 키워드';

    function setText(t) {
      document.getElementById('input').value = t;
      runCheck();
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('result').style.display = 'none';
    }

    function runCheck() {
      const text = document.getElementById('input').value;
      const rating = parseInt(document.getElementById('ratingSelect').value, 10);
      const r = ReviewFilter.check(text);
      const lowRating = rating <= 2;
      const el = document.getElementById('result');
      el.style.display = 'block';

      let cls, title, body;
      if (r.blockedHard) {
        cls = 'hard';
        title = '🔒 하드 차단됨 — 작성 불가';
        body = '<div>매칭된 표현:</div><div class="matches">'
             + r.hardMatches.map(m => '<span class="tag">' + escapeHtml(m) + '</span>').join('')
             + '</div>'
             + '<div style="margin-top:12px;font-size:0.84rem;color:#555;">실제 작성 시 사용자에게 "부적절한 표현이 포함되어 등록할 수 없습니다" 안내 표시. 별점과 무관하게 차단됨.</div>';
      } else if (r.flaggedSoft || lowRating) {
        cls = 'soft';
        title = '⚠️ 자동 보류 — 관리자 검토 대기';
        const reasons = [];
        if (r.flaggedSoft) reasons.push('<strong>키워드 매칭:</strong> ' + r.softMatches.map(m => '<span class="tag">' + escapeHtml(m) + '</span>').join(' '));
        if (lowRating) reasons.push('<strong>낮은 별점:</strong> <span class="tag">' + rating + '점 (≤ 2)</span>');
        body = '<div>' + reasons.join('<br><br>') + '</div>'
             + '<div style="margin-top:12px;font-size:0.84rem;color:#555;">작성은 허용되지만 <code>is_public=false</code> + <code>auto_flagged=true</code>로 저장됩니다. 관리자 대시보드 "🚩 리뷰 검토" 탭의 "검토 대기"에 표시되고, 관리자가 유지/숨김을 결정합니다.</div>';
      } else {
        cls = 'ok';
        title = '✓ 통과 — 정상 공개';
        body = '<div style="font-size:0.88rem;color:#2e7d32;">금칙어·낮은 별점 모두 해당 없음. 즉시 공개됩니다.</div>';
      }

      el.className = 'result ' + cls;
      el.innerHTML = '<h3>' + title + '</h3>' + body;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }
  </script>
</body>
</html>
